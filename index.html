<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Strassen Matrix Multiplier | LPU Project</title>
    <style>
        body { font-family: system-ui; max-width: 600px; margin: 50px auto; background: #1a1a1a; color: #fff; }
        h1 { color: #4ade80; }
        textarea { width: 100%; height: 100px; background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 8px; }
        button { width: 100%; padding: 15px; background: #4ade80; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        td { border: 1px solid #444; padding: 10px; text-align: center; }
    </style>
</head>
<body>
    <h1>Strassen Matrix Multiplier 🚀</h1>
    <label>Matrix A:</label>
    <textarea id="matrixA">[[1, 2], [3, 4]]</textarea>
    <label>Matrix B:</label>
    <textarea id="matrixB">[[5, 6], [7, 8]]</textarea>
    <button onclick="multiply()">Multiply</button>
    <div id="result"></div>

    <script>
        async function multiply() {
            const resultDiv = document.getElementById('result');
            try {
                const matrixA = JSON.parse(document.getElementById('matrixA').value);
                const matrixB = JSON.parse(document.getElementById('matrixB').value);

                const response = await fetch('https://strassen-api.onrender.com/multiply', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ matrixA, matrixB })
                });

                const data = await response.json();
                resultDiv.innerHTML = `
                    <h3>Result:</h3>
                    <table>
                        ${data.result.map(row => `<tr>${row.map(val => `<td>${val}</td>`).join('')}</tr>`).join('')}
                    </table>
                `;
            } catch (error) {
                resultDiv.innerText = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
